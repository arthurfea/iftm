!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="">
        <label for="nome">Nome: </label><input id="nome" type="text"><br>
        <input type="radio" name="sexo" id="masculino">
        <label for="masculino">Masculino</label>
        <input type="radio" name="sexo" id="feminino">
        <label for="feminino">Feminino</label><br>
        <label for="estado-civil">Estado Civil:</label>
        <select name="estado-civil" id="estado-civil">
            <option value="" selected disabled hidden>Selecione</option>
            <option value="solteiro(a)">Solteiro(a)</option>
            <option value="casado(a)">Casado(a)</option>
            <option value="viuvo(a)">Viúvo(a)</option>
            <option value="divorciado(a)">Divorciado(a)</option>
            <option value="outro">Outro</option>
        </select><br>
        <label for="email">Email: </label>
        <input id="email" type="email"><br>
        <label for="tel">Telefone: </label>
        <input id="tel" type="tel"><br>
        <label for="pagina-pessoal">Página Pessoal: </label><br>
        <input id="pagina-pessoal" type="url">
        <label for="endereco">Endereço: </label>
        <input id="endereco" type="text"><br>
        <label for="numero">Número: </label>
        <input id="numero" type="number"><br>
        <label for="date">Data de Nascimento: </label>
        <input type="date"><br>
        <button type="submit">Cadastrar</button><button type="reset">Limpar</button>
    </form>
</body>
</html>
